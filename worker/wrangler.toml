name = "talkflip-translator"
main = "src/index.ts"
compatibility_date = "2026-05-15"

# Usage counter for the free-tier hard stop (monthly character cap).
# Create the namespace with:  wrangler kv namespace create USAGE
# then paste the printed id below (replace REPLACE_WITH_KV_NAMESPACE_ID).
[[kv_namespaces]]
binding = "USAGE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
